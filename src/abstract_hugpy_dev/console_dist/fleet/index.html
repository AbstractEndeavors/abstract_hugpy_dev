    <!-- Same type system as the other arms: Newsreader serif + IBM Plex Mono. -->

      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Standalone shell paint — served alone at /fleet, so painting the page
         chrome here cannot bleed into another site. Keeps the dark theme over
         the entire viewport before the bundle loads. */
      html,
      body {
        margin: 0;
        background: #050505;
      }
      #root {
        /* #root is the bounded scroll container (fixed viewport height, scrolls
           internally) so the sticky nav inside it pins to #root's top and rides
           along as content scrolls — a min-height box would instead grow and
           carry the "sticky" nav off with the window (operator directive
           2026-07-21). overflow-x clip lives here too, on the same scroll box, so
           it can't create a SEPARATE containing block that breaks the sticky. */
        height: 100dvh;
        overflow-y: auto;
        overflow-x: hidden;
        background: #050505;
      }
    </style>
    <script type="module" crossorigin src="/fleet/assets/index-Bcg0MVMU.js"></script>
